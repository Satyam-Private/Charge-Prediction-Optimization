<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SmartCharge Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #050c12;
            --panel: #0b1d2e;
            --border: #0f4060;
            --accent: #00d4ff;
            --accent2: #00ff88;
            --text: #c8e8f5;
            --muted: #4a7a99;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none; z-index: 0;
        }

        /* Glow spots */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 600px 500px at 20% 40%, rgba(0,212,255,0.07) 0%, transparent 70%),
                radial-gradient(ellipse 500px 400px at 80% 60%, rgba(123,79,255,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── CARD ── */
        .auth-card {
            position: relative; z-index: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 44px 40px;
            width: 100%; max-width: 420px;
            margin: 24px;
            animation: fadeUp 0.55s ease both;
        }

        /* top accent line */
        .auth-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            border-radius: 16px 16px 0 0;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-align: center;
        }

        .alert-success {
            background: rgba(0,255,136,0.1);
            border: 1px solid var(--accent2);
            color: var(--accent2);
        }

        .alert-warning {
            background: rgba(255,165,0,0.1);
            border: 1px solid #ffa500;
            color: #ffa500;
        }

        .alert-danger {
            background: rgba(255,77,109,0.1);
            border: 1px solid #ff4d6d;
            color: #ff4d6d;
        }

        .flash-messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .alert {
            position: relative;
            opacity: 1;
            transition: opacity 0.25s ease, transform 0.25s ease, max-height 0.25s ease, margin 0.25s ease, padding 0.25s ease;
        }

        .alert.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            max-height: 0;
            margin: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        /* ── LOGO ── */
        .card-logo {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Orbitron', monospace;
            font-size: 0.82rem; font-weight: 700;
            color: var(--accent); letter-spacing: 0.06em;
            margin-bottom: 32px;            text-decoration: none;
            transition: color 0.2s ease;
        }

        .card-logo:hover {
            color: var(--accent2);        }

        .logo-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent2); box-shadow: 0 0 10px var(--accent2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:0.4; transform:scale(0.75); }
        }

        /* ── HEADING ── */
        .card-heading {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem; font-weight: 900;
            color: #fff; margin-bottom: 6px;
        }

        .card-sub {
            font-size: 0.88rem; color: var(--muted);
            margin-bottom: 36px; line-height: 1.5;
        }

        /* ── FORM ── */
        .form-group {
            display: flex; flex-direction: column; gap: 7px;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 0.7rem; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--muted);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.85rem; color: var(--muted);
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px 12px 38px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input::placeholder { color: #1e4060; }

        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(0,212,255,0.04);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #050c12;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            padding: 13px; border-radius: 8px; border: none;
            cursor: pointer;
            box-shadow: 0 0 28px rgba(0,212,255,0.35);
            transition: all 0.25s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 44px rgba(0,212,255,0.55);
        }

        /* ── FOOTER LINK ── */
        .card-footer {
            margin-top: 24px; text-align: center;
            font-size: 0.84rem; color: var(--muted);
        }

        .card-footer a {
            color: var(--accent); text-decoration: none;
            font-weight: 500; transition: color 0.2s;
        }

        .card-footer a:hover { color: var(--accent2); }

        /* ── BACK LINK ── */
        .back-link {
            position: fixed; top: 24px; left: 28px; z-index: 10;
            display: flex; align-items: center; gap: 7px;
            font-size: 0.78rem; font-weight: 500;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--muted); text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        /* ── RESPONSIVE TABLETS: 768px ── */
        @media (max-width: 768px) {
            .auth-card { padding: 40px 36px 34px; margin: 20px; }
            .card-logo { font-size: 0.78rem; margin-bottom: 28px; }
            .card-heading { font-size: 1.3rem; margin-bottom: 5px; }
            .card-sub { font-size: 0.83rem; margin-bottom: 32px; }
            .form-group { margin-bottom: 18px; }
            .form-group input { font-size: 0.9rem; padding: 11px 12px 11px 36px; }
            .input-wrap i { font-size: 0.78rem; left: 12px; }
            .btn-submit { font-size: 0.83rem; padding: 12px; }
            .card-footer { font-size: 0.8rem; margin-top: 20px; }
        }

        /* ── RESPONSIVE MOBILE: 680px ── */
        @media (max-width: 680px) {
            .back-link { font-size: 0.73rem; padding: 8px 12px; left: 12px; top: 16px; }
            .auth-card { padding: 32px 24px 28px; margin: 16px; max-width: 100%; }
            .card-logo { font-size: 0.75rem; gap: 6px; margin-bottom: 24px; }
            .logo-dot { width: 6px; height: 6px; }
            .card-heading { font-size: 1.15rem; }
            .card-sub { font-size: 0.8rem; margin-bottom: 28px; line-height: 1.4; }
            .form-group { margin-bottom: 16px; }
            .form-group label { font-size: 0.65rem; }
            .form-group input { font-size: 0.86rem; padding: 10px 11px 10px 34px; border-radius: 6px; }
            .input-wrap i { font-size: 0.75rem; left: 11px; }
            .btn-submit { font-size: 0.8rem; padding: 11px; margin-top: 6px; }
            .card-footer { font-size: 0.76rem; margin-top: 18px; }
        }

        /* ── RESPONSIVE SMALL MOBILE: 480px ── */
        @media (max-width: 480px) {
            .back-link { font-size: 0.7rem; }
            .auth-card { padding: 28px 20px 24px; margin: 12px; }
            .card-logo { font-size: 0.7rem; margin-bottom: 20px; }
            .card-heading { font-size: 1rem; margin-bottom: 4px; }
            .card-sub { font-size: 0.77rem; margin-bottom: 24px; }
            .form-group { margin-bottom: 14px; }
            .form-group label { font-size: 0.62rem; }
            .form-group input { font-size: 0.85rem; padding: 9px 10px 9px 32px; }
            .input-wrap i { font-size: 0.7rem; left: 10px; }
            .btn-submit { font-size: 0.77rem; padding: 10px; }
            .card-footer { font-size: 0.73rem; }
        }

        /* ── RESPONSIVE EXTRA SMALL: 375px ── */
        @media (max-width: 375px) {
            .back-link { display: none; }
            .auth-card { padding: 24px 16px 20px; margin: 12px; border-radius: 12px; }
            .card-logo { font-size: 0.65rem; margin-bottom: 18px; }
            .card-heading { font-size: 0.95rem; }
            .card-sub { font-size: 0.73rem; margin-bottom: 20px; }
            .form-group { margin-bottom: 12px; }
            .form-group label { font-size: 0.6rem; }
            .form-group input { font-size: 0.82rem; padding: 8px 8px 8px 30px; }
            .input-wrap i { font-size: 0.65rem; left: 9px; }
            .btn-submit { font-size: 0.73rem; padding: 9px; }
            .card-footer { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <a href="{{ url_for('index') }}" class="back-link">
        <i class="fas fa-arrow-left"></i> Back Home
    </a>

    <div class="auth-card">

        <a href="{{ url_for('index') }}" class="card-logo">
            <div class="logo-dot"></div>
            SmartCharge Pro
        </a>

        <h2 class="card-heading">Welcome back</h2>
        <p class="card-sub">Sign in to access your charging dashboard.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-bolt"></i> Login
            </button>

        </form>

        <p class="card-footer">
            Don't have an account? <a href="/register">Register</a>
        </p>

    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.flash-messages .alert').forEach(alert => {
                setTimeout(() => {
                    alert.classList.add('fade-out');
                    setTimeout(() => alert.remove(), 300);
                }, 4200);
            });
        });
    </script>
</body>
</html>
